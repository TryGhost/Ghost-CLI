name: Local E2E Tests
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: local-e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  local-e2e-linux:
    runs-on: ubuntu-latest
    name: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: "cli"
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6
        with:
          package_json_file: cli/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml
      - name: Install Setuptools (Linux)
        run: pip3 install --upgrade setuptools
      - name: Prepare CLI
        working-directory: ./cli
        run: pnpm install --frozen-lockfile
      - name: Setting up Ghost instance
        run: node ./cli/bin/ghost install local -d ghost
      - name: Verifying Installation
        run: |
          for attempt in {1..15}; do
            if curl -fsS http://localhost:2368 | grep -qi ghost; then
              exit 0
            fi
            sleep 2
          done

          echo "Ghost site did not become reachable after install"
          exit 1
      - name: Recording running process pid
        run: |
          if [ ! -f ghost/.ghostpid ]; then
            echo "Ghost pidfile was missing before stop"
            exit 1
          fi
          BEFORE_PID="$(cat ghost/.ghostpid)"
          if [ -z "$BEFORE_PID" ]; then
            echo "Ghost pidfile was empty before stop"
            exit 1
          fi
          echo "LOCAL_BEFORE_PID=$BEFORE_PID" >> "$GITHUB_ENV"
      - name: Stopping Ghost instance
        run: |
          node ./cli/bin/ghost stop -d ghost
          for attempt in {1..15}; do
            pidfile_removed=true
            site_stopped=true

            if [ -f ghost/.ghostpid ]; then
              pidfile_removed=false
            fi

            if curl -fsS http://localhost:2368 > /dev/null; then
              site_stopped=false
            fi

            if [ "$pidfile_removed" = true ] && [ "$site_stopped" = true ]; then
              exit 0
            fi

            sleep 2
          done

          echo "Ghost local process did not fully stop within the retry window"
          exit 1
      - name: Starting Ghost instance
        run: node ./cli/bin/ghost start -d ghost
      - name: Verifying Restart
        run: |
          for attempt in {1..15}; do
            if [ -f ghost/.ghostpid ] && \
              [ "$(cat ghost/.ghostpid)" != "$LOCAL_BEFORE_PID" ] && \
              curl -fsS http://localhost:2368 | grep -qi ghost; then
              exit 0
            fi
            sleep 2
          done

          echo "Ghost local process did not restart with a new pid"
          exit 1

  local-e2e-macos:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: macos-latest
    name: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: "cli"
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6
        with:
          package_json_file: cli/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml
      - name: Install Setuptools (MacOS)
        run: brew install python-setuptools
      - name: Prepare CLI
        working-directory: ./cli
        run: pnpm install --frozen-lockfile
      - name: Setting up Ghost instance
        run: node ./cli/bin/ghost install local -d ghost
      - name: Verifying Installation
        run: |
          for attempt in {1..15}; do
            if curl -fsS http://localhost:2368 | grep -qi ghost; then
              exit 0
            fi
            sleep 2
          done

          echo "Ghost site did not become reachable after install"
          exit 1
      - name: Recording running process pid
        run: |
          if [ ! -f ghost/.ghostpid ]; then
            echo "Ghost pidfile was missing before stop"
            exit 1
          fi
          BEFORE_PID="$(cat ghost/.ghostpid)"
          if [ -z "$BEFORE_PID" ]; then
            echo "Ghost pidfile was empty before stop"
            exit 1
          fi
          echo "LOCAL_BEFORE_PID=$BEFORE_PID" >> "$GITHUB_ENV"
      - name: Stopping Ghost instance
        run: |
          node ./cli/bin/ghost stop -d ghost
          for attempt in {1..15}; do
            pidfile_removed=true
            site_stopped=true

            if [ -f ghost/.ghostpid ]; then
              pidfile_removed=false
            fi

            if curl -fsS http://localhost:2368 > /dev/null; then
              site_stopped=false
            fi

            if [ "$pidfile_removed" = true ] && [ "$site_stopped" = true ]; then
              exit 0
            fi

            sleep 2
          done

          echo "Ghost local process did not fully stop within the retry window"
          exit 1
      - name: Starting Ghost instance
        run: node ./cli/bin/ghost start -d ghost
      - name: Verifying Restart
        run: |
          for attempt in {1..15}; do
            if [ -f ghost/.ghostpid ] && \
              [ "$(cat ghost/.ghostpid)" != "$LOCAL_BEFORE_PID" ] && \
              curl -fsS http://localhost:2368 | grep -qi ghost; then
              exit 0
            fi
            sleep 2
          done

          echo "Ghost local process did not restart with a new pid"
          exit 1
