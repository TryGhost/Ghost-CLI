name: Local E2E Tests
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: local-e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  local-e2e-linux:
    runs-on: ubuntu-latest
    name: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: "cli"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: cli/yarn.lock
      - name: Install Setuptools (Linux)
        run: pip3 install --upgrade setuptools
      - name: Prepare CLI
        run: yarn --cwd cli install --frozen-lockfile
      - name: Use latest global yarn version
        run: |
          cd ~
          yarn set version berry
      - name: Setting up Ghost instance
        run: node ./cli/bin/ghost install local -d ghost
      - name: Verifying Installation
        run: sleep 2 && curl -f http://localhost:2368 | grep ghost
      - name: Stopping Ghost instance
        run: |
          node ./cli/bin/ghost stop -d ghost
          if [ -f ghost/.ghostpid ]; then
            echo "Ghost pidfile still exists after ghost stop"
            exit 1
          fi
          if curl -fsS http://localhost:2368 > /dev/null; then
            echo "Ghost site is still reachable after ghost stop"
            exit 1
          fi
      - name: Starting Ghost instance
        run: node ./cli/bin/ghost start -d ghost
      - name: Verifying Restart
        run: sleep 2 && curl -f http://localhost:2368 | grep ghost

  local-e2e-macos:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: macos-latest
    name: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: "cli"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: cli/yarn.lock
      - name: Install Setuptools (MacOS)
        run: brew install python-setuptools
      - name: Prepare CLI
        run: yarn --cwd cli install --frozen-lockfile
      - name: Use latest global yarn version
        run: |
          cd ~
          yarn set version berry
      - name: Setting up Ghost instance
        run: node ./cli/bin/ghost install local -d ghost
      - name: Verifying Installation
        run: sleep 2 && curl -f http://localhost:2368 | grep ghost
      - name: Stopping Ghost instance
        run: |
          node ./cli/bin/ghost stop -d ghost
          if [ -f ghost/.ghostpid ]; then
            echo "Ghost pidfile still exists after ghost stop"
            exit 1
          fi
          if curl -fsS http://localhost:2368 > /dev/null; then
            echo "Ghost site is still reachable after ghost stop"
            exit 1
          fi
      - name: Starting Ghost instance
        run: node ./cli/bin/ghost start -d ghost
      - name: Verifying Restart
        run: sleep 2 && curl -f http://localhost:2368 | grep ghost
